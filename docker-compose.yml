services:
  eos_connect:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/ohand/eos_connect:snapshot
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data                    # Persistent config DB + data
      - ./src/config.yaml:/app/config.yaml   # Bootstrap config (optional)
    environment:
      - PYTHONUNBUFFERED=1
      # Optional bootstrap overrides (take precedence over config.yaml):
      # - EOS_WEB_PORT=8081
      # - EOS_TIMEZONE=Europe/Berlin
      # - EOS_LOG_LEVEL=INFO
    restart: unless-stopped